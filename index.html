<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tesauro Armónico · Guitarra</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Inter+Tight:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f9f8f5;
  --surface: #ffffff;
  --surface-2: #f2f1ee;
  --border: #e4e2dc;
  --border-strong: #ccc9c0;
  --text: #1c1b18;
  --text-2: #6b6860;
  --text-3: #9e9b94;
  --accent: #2563eb;
  --accent-subtle: #eff4ff;
  --purple-art: #7c3aed;
  --freeze: #0891b2;
  --freeze-bg: #ecfeff;

  --c-p2: #16a34a;
  --c-p3: #ca8a04;
  --c-p5: #ea580c;
  --c-p7: #2563eb;
  --c-px: #71717a;
  --c-alert: #dc2626;

  --fret: #c4bfb5;
  --string: #d1ccc0;
  --nut: #57534e;

  --r: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

.app {
  height: 100vh;
  display: grid;
  grid-template-rows: auto auto 1fr;
  overflow: hidden;
}

/* ── Header ── */
.header {
  padding: 16px 28px 0;
  display: flex;
  align-items: baseline;
  gap: 12px;
  flex-shrink: 0;
}
.header h1 {
  font-family: 'Inter Tight', sans-serif;
  font-size: 20px;
  font-weight: 400;
  letter-spacing: -0.03em;
  color: var(--text);
}
.header h1 em {
  font-style: italic;
  font-weight: 300;
  color: var(--text-2);
}
.header-version {
  font-size: 9px;
  color: var(--text-3);
  letter-spacing: 0.06em;
  font-weight: 400;
}

/* ── Top bar ── */
.top-bar {
  padding: 12px 28px 14px;
  display: flex;
  align-items: center;
  gap: 20px;
  flex-wrap: nowrap;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

/* Note input */
.nota-wrap { position: relative; margin-top: 14px; }
.nota-label {
  position: absolute;
  top: -14px; left: 0;
  font-size: 10px;
  font-weight: 500;
  color: var(--text-3);
  letter-spacing: 0.07em;
  text-transform: uppercase;
}
#inputNota {
  font-family: 'Inter Tight', sans-serif;
  font-size: 30px;
  font-weight: 300;
  letter-spacing: -0.02em;
  color: var(--text);
  background: transparent;
  border: none;
  border-bottom: 2px solid var(--border-strong);
  width: 90px;
  padding: 2px 4px 3px;
  outline: none;
  transition: border-color 0.15s;
  text-align: center;
}
#inputNota:focus { border-bottom-color: var(--accent); }

/* Divider */
.divider {
  width: 1px;
  height: 36px;
  background: var(--border);
  flex-shrink: 0;
}

/* Piano */
.piano-outer {
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
  flex: 1;
  min-width: 0;
}
.piano-outer::-webkit-scrollbar { display: none; }

.piano-keys {
  display: flex;
  align-items: flex-start;
  height: 40px;
  padding: 0 2px;
}

.key {
  flex-shrink: 0;
  cursor: pointer;
  transition: background 0.1s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.key.white {
  width: 18px;
  height: 40px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 3px 3px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 3px;
}
.key.white:hover { background: #f0efea; }
.key.white.active {
  background: var(--accent-subtle);
  border-color: var(--accent);
}
.key.white.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2.5px;
  background: var(--accent);
  border-radius: 0 0 2px 2px;
}
.key.black {
  width: 11px;
  height: 24px;
  background: var(--text);
  border-radius: 0 0 2px 2px;
  margin: 0 -5.5px;
  z-index: 2;
}
.key.black:hover { background: #3a3a3a; }
.key.black.active { background: var(--accent); }
.middle-c-dot {
  width: 3px; height: 3px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.4;
  margin-bottom: 5px;
  flex-shrink: 0;
}

/* Estilos Visor */
.visor-container {
  width: 120px;
  height: 54px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 4px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* Checks */
.checks-wrap {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
  flex-shrink: 0;
}

.check-pill {
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 20px;
  transition: all 0.15s;
  user-select: none;
  white-space: nowrap;
  background: var(--surface);
}
.check-pill:hover { border-color: var(--border-strong); }
.check-pill:has(input:checked) {
  background: var(--accent-subtle);
  border-color: var(--accent);
  color: var(--accent);
}
.check-pill input[type="checkbox"] {
  appearance: none;
  width: 13px; height: 13px;
  border: 1.5px solid var(--border-strong);
  border-radius: 3px;
  cursor: pointer;
  display: grid;
  place-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
  background: white;
}
.check-pill:has(input:checked) input[type="checkbox"] {
  background: var(--accent);
  border-color: var(--accent);
}
.check-pill:has(input:checked) input[type="checkbox"]::before {
  content: '';
  width: 7px; height: 7px;
  clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
  background: white;
}
.check-pill label {
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  pointer-events: none;
}

.btn-clear {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-3);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.02em;
  white-space: nowrap;
}
.btn-clear:hover { border-color: var(--border-strong); color: var(--text-2); }

/* ── Main ── */
.main {
  display: grid;
  grid-template-columns: 1fr 290px;
  overflow: hidden;
  min-height: 0;
}

@media (max-width: 860px) {
  .main { grid-template-columns: 1fr; grid-template-rows: 1fr 200px; }
  .side-panel { border-left: none; border-top: 1px solid var(--border); }
}
@media (min-width: 1280px) {
  .main { grid-template-columns: 1fr 320px; }
}
@media (min-width: 1600px) {
  .main { grid-template-columns: 1fr 380px; }
  #inputNota { font-size: 34px; width: 100px; }
}

/* ── Fretboard ── */
.fretboard-wrap {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px 20px;
  overflow: hidden;
  background: var(--bg);
}

#mastil { width: 100%; height: auto; max-height: 100%; }

/* SVG classes */
.cuerda { stroke: var(--string); }
.label-cuerda { font-size: 10.5px; text-anchor: end; fill: var(--text-2); font-weight: 600; font-family: 'Inter', sans-serif; }
.label-romano { font-size: 9px; fill: var(--text-3); text-anchor: middle; font-weight: 500; font-family: 'Inter', sans-serif; }
.traste-metal { stroke: var(--fret); stroke-width: 1.5; }
.cejuela { stroke: var(--nut); stroke-width: 3; }
.nodo { stroke: white; stroke-width: 1.5; }
.guia-vertical { stroke-width: 1; stroke-dasharray: 3,2; opacity: 0.85; }
.guia-90 { stroke-width: 1; stroke-dasharray: 3,3; stroke: var(--purple-art); opacity: 0.6; }
.icono-mano { fill: none; stroke-width: 1.5; stroke-linecap: round; }

/* ── Side panel ── */
.side-panel {
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: var(--surface);
}

.panel-top {
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

.panel-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  letter-spacing: 0.07em;
  text-transform: uppercase;
}

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 10px;
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--text-2);
  font-weight: 400;
}
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Results */
.results-list {
  overflow-y: auto;
  flex: 1;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.results-list::-webkit-scrollbar { width: 4px; }
.results-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 6px;
  color: var(--text-3);
  font-size: 13px;
  padding: 20px;
  text-align: center;
}

.result-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-bottom: 1px solid var(--border);
  transition: background 0.1s;
}
.result-row:last-child { border-bottom: none; }
.result-row:hover { background: var(--surface-2); }
.result-row.frozen { background: var(--freeze-bg); }
.result-row.frozen:hover { background: #e0f9fc; }

.freeze-btn {
  width: 20px; height: 20px;
  border: none;
  background: none;
  cursor: pointer;
  padding: 0;
  border-radius: 3px;
  display: grid;
  place-content: center;
  flex-shrink: 0;
  color: var(--text-3);
  transition: all 0.12s;
}
.freeze-btn:hover { color: var(--freeze); background: var(--freeze-bg); }
.freeze-btn.on { color: var(--freeze); }
.freeze-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

.row-body { flex: 1; min-width: 0; }
.row-main {
  font-size: 12.5px;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.row-main b { font-weight: 600; }
.row-sub { font-size: 11px; color: var(--text-3); margin-top: 0.5px; }

.row-right {
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
}

.diff-dots { display: flex; gap: 2px; }
.diff-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--c-alert); opacity: 0.45; }

.cents {
  font-family: 'Inter', monospace;
  font-size: 11px;
  font-weight: 600;
  padding: 2px 5px;
  border-radius: 4px;
  background: var(--surface-2);
  min-width: 34px;
  text-align: center;
  letter-spacing: -0.01em;
}

.frozen-tag {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--freeze);
  background: #cffafe;
  padding: 1px 4px;
  border-radius: 3px;
  flex-shrink: 0;
}

/* Bravura font for SMuFL symbols */
@font-face {
  font-family: 'Bravura';
  src: url('fonts/Bravura.woff2') format('woff2');
  font-weight: normal; font-style: normal; font-display: block;
}
.sym {
  font-family: 'Bravura', serif;
  font-size: 24px;
  line-height: 1;
  width: 24px;
  text-align: center;
  flex-shrink: 0;
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <h1>Tesauro <em>armónico</em> de la guitarra</h1>
    <span class="header-version">Juan del Pino · v5.2.1</span>
  </div>

  <div class="top-bar">
    <div class="nota-wrap">
      <span class="nota-label">Nota</span>
      <input type="text" id="inputNota" value="B4" oninput="actualizarDesdeInput()" spellcheck="false" autocomplete="off">
    </div>

    <div class="divider"></div>

    <div class="piano-outer" id="piano"></div>

    <div class="divider"></div>

    <div class="visor-container">
      <svg id="svg-visor" width="120" height="64" viewBox="0 0 120 54" font-family="Bravura">
        <g stroke="#e4e2dc" stroke-width="0.8">
          <path d="M0 12.5H120M0 20.5H120M0 28.5H120M0 36.5H120M0 44.5H120"/>
        </g>
        <text x="8" y="38" font-size="22pt" fill="#1c1b18">&#xE050;</text>
        <g id="note-group-visor"></g>
      </svg>
    </div>

    <div class="divider"></div>

    <div class="checks-wrap">
      <label class="check-pill">
        <input type="checkbox" id="checkArtificial" onchange="buscarNota()">
        <label for="checkArtificial">Art. 8.ª</label>
      </label>
      <label class="check-pill">
        <input type="checkbox" id="checkSuperiores" onchange="buscarNota()">
        <label for="checkSuperiores">Parciales 8–12</label>
      </label>
      <label class="check-pill">
        <input type="checkbox" id="checkCercanos" onchange="buscarNota()">
        <label for="checkCercanos">~50¢</label>
      </label>
      <button class="btn-clear" onclick="borrarCongelados()">Borrar ❄</button>
    </div>
  </div>

  <div class="main">
    <div class="fretboard-wrap">
      <svg id="mastil" viewBox="0 0 1000 310">
        <g id="trastero"></g>
        <g id="cuerdas-group"></g>
        <g id="capa-nodos"></g>
      </svg>
    </div>

    <div class="side-panel">
      <div class="panel-top">
        <span class="panel-label">Armónicos</span>
        <div class="legend">
          <div class="legend-item"><div class="dot" style="background:var(--c-p2)"></div>Oct.</div>
          <div class="legend-item"><div class="dot" style="background:var(--c-p3)"></div>5.ª</div>
          <div class="legend-item"><div class="dot" style="background:var(--c-p5)"></div>3.ª</div>
          <div class="legend-item"><div class="dot" style="background:var(--c-p7)"></div>7.ª m</div>
          <div class="legend-item"><div class="dot" style="background:var(--freeze)"></div>❄</div>
        </div>
      </div>
      <div class="results-list" id="infoBox"></div>
    </div>
  </div>
</div>

<script>
const LARGO_CUERDA = 860;
const OFFSET_X = 72;

const CUERDAS_DATA = [
  { nota:"E4", y:56,  midi:64 },
  { nota:"B3", y:98,  midi:59 },
  { nota:"G3", y:140, midi:55 },
  { nota:"D3", y:182, midi:50 },
  { nota:"A2", y:224, midi:45 },
  { nota:"E2", y:266, midi:40 }
];

const SERIE = [
  {p:2,  s:12,    c:'var(--c-p2)', n:'Octava',        cents:0,   sym:"\uE261", frac:"1/2"},
  {p:3,  s:19.02, c:'var(--c-p3)', n:'5.ª Justa',       cents:2,   sym:"\uE282", frac:"1/3"},
  {p:4,  s:24,    c:'var(--c-p2)', n:'2.ª Octava',      cents:0,   sym:"\uE261", frac:"1/4"},
  {p:5,  s:27.86, c:'var(--c-p5)', n:'3.ª Mayor',       cents:-14, sym:"\uE2C1", frac:"1/5"},
  {p:6,  s:31.02, c:'var(--c-p3)', n:'2.ª Oct. + 5.ª',  cents:2,   sym:"\uE282", frac:"1/6"},
  {p:7,  s:33.69, c:'var(--c-p7)', n:'7.ª Menor',       cents:-31, sym:"\uE281", frac:"1/7"},
  {p:8,  s:36,    c:'var(--c-p2)', n:'3.ª Octava',      cents:0,   sym:"\uE261", frac:"1/8"},
  {p:9,  s:38.04, c:'var(--c-px)', n:'2.ª Mayor',       cents:4,   sym:"\uE261", frac:"1/9"},
  {p:10, s:39.86, c:'var(--c-p5)', n:'3.ª Mayor',       cents:-14, sym:"\uE2C1", frac:"1/10"},
  {p:11, s:41.51, c:'var(--c-px)', n:'4.ª Aumentada',   cents:-49, sym:"\uE280", frac:"1/11"},
  {p:12, s:43.02, c:'var(--c-p3)', n:'3.ª Oct. + 5.ª',  cents:2,   sym:"\uE282", frac:"1/12"}
];

let congelados = [];
let resultadosActuales = [];

// Para lógica de enarmonía del visor
let lastMidiVisor = 71; 
let direccionVisor = "subiendo";

const snowSVG = `<svg viewBox="0 0 24 24"><path d="M12 2v20M2 12h20M12 12l7-7M12 12l-7-7M12 12l7 7M12 12l-7 7M12 5l3 2M12 5l-3 2M12 19l3-2M12 19l-3-2M5 12l2-3M5 12l2 3M19 12l-2-3M19 12l-2 3"/></svg>`;

// Mapeo Visor
const VISOR_DATA = {
  0: { n: "C",  s: 0, alt: "" }, 1: { n: "C#", s: 0, alt: "\uE262", en: "Db", enS: 1, enAlt: "\uE260" },
  2: { n: "D",  s: 1, alt: "" }, 3: { n: "D#", s: 1, alt: "\uE262", en: "Eb", enS: 2, enAlt: "\uE260" },
  4: { n: "E",  s: 2, alt: "" }, 5: { n: "F",  s: 3, alt: "" },
  6: { n: "F#", s: 3, alt: "\uE262", en: "Gb", enS: 4, enAlt: "\uE260" }, 7: { n: "G",  s: 4, alt: "" },
  8: { n: "G#", s: 4, alt: "\uE262", en: "Ab", enS: 5, enAlt: "\uE260" }, 9: { n: "A",  s: 5, alt: "" },
  10:{ n: "A#", s: 5, alt: "\uE262", en: "Bb", enS: 6, enAlt: "\uE260" }, 11:{ n: "B",  s: 6, alt: "" }
};

function toRoman(n) {
  const r=["","I","II","III","IV","V","VI","VII","VIII","IX","X","XI","XII","XIII","XIV","XV","XVI","XVII","XVIII","XIX","XX","XXI","XXII"];
  return r[n]||n;
}
function gcd(a,b){return b?gcd(b,a%b):a;}
function getX(t){return OFFSET_X+(LARGO_CUERDA-(LARGO_CUERDA/Math.pow(2,t/12)));}
function getXRatio(r){return OFFSET_X+(LARGO_CUERDA*r);}
function generarID(r){return r.type==='nat'?`nat-${r.cuerda.nota}-${r.arm.p}`:`art-${r.cuerda.nota}-${r.traste}`;}
function getCentsColor(c){
  if(Math.abs(c)<=5) return "var(--c-p2)";
  if(c<0) return "var(--c-p7)";
  return "var(--c-p5)";
}
function notaToMidi(n){
  const m=n.match(/([A-G]#?)(\d)/);
  if(!m) return null;
  const idx=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"].indexOf(m[1]);
  if(idx===-1) return null;
  return(parseInt(m[2])+1)*12+idx;
}

function init(){
  buildPiano();
  dibujarMastil();
  buscarNota();
  highlightKey("B4");
}

function buildPiano(){
  const piano=document.getElementById('piano');
  const nombres=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  const notas=[];
  for(let o=3;o<=7;o++){
    for(let i=0;i<12;i++){
      let n=nombres[i]+o;
      if(o===3&&i<4) continue;
      notas.push(n);
    }
  }
  const wrap=document.createElement('div');
  wrap.className='piano-keys';
  notas.forEach(n=>{
    const k=document.createElement('div');
    k.className=`key ${n.includes('#')?'black':'white'}`;
    k.dataset.note=n;
    if(n==="C4"){const d=document.createElement('div');d.className='middle-c-dot';k.appendChild(d);}
    k.onclick=()=>{
      document.getElementById('inputNota').value=n;
      let m = notaToMidi(n);
      if(m > lastMidiVisor) direccionVisor = "subiendo";
      if(m < lastMidiVisor) direccionVisor = "bajando";
      lastMidiVisor = m;
      buscarNota();
      highlightKey(n);
    };
    wrap.appendChild(k);
  });
  piano.appendChild(wrap);
}

function highlightKey(note){
  document.querySelectorAll('.key').forEach(k=>k.classList.toggle('active',k.dataset.note===note.toUpperCase()));
}

function actualizarDesdeInput(){
  const val=document.getElementById('inputNota').value.trim().toUpperCase();
  let m = notaToMidi(val);
  if(m){
    if(m > lastMidiVisor) direccionVisor = "subiendo";
    if(m < lastMidiVisor) direccionVisor = "bajando";
    lastMidiVisor = m;
  }
  buscarNota();
  highlightKey(val);
}

function dibujarMastil(){
  const trastero=document.getElementById('trastero');
  trastero.innerHTML="";
  for(let i=0;i<=22;i++){
    let x=getX(i);
    let l=document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1",x);l.setAttribute("y1",36);l.setAttribute("x2",x);l.setAttribute("y2",280);
    l.classList.add(i===0?"cejuela":"traste-metal");
    trastero.appendChild(l);
    if(i>0&&(i<=16||i%2===0)){
      let t=document.createElementNS("http://www.w3.org/2000/svg","text");
      t.setAttribute("x",x);t.setAttribute("y",28);
      t.textContent=toRoman(i);t.classList.add("label-romano");
      trastero.appendChild(t);
    }
  }
  [3,5,7,9,12,15,17,19,21].forEach(f=>{
    const cx=(getX(f-1)+getX(f))/2;
    if(f===12){
      [290,298].forEach(cy=>{
        const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
        c.setAttribute("cx",cx);c.setAttribute("cy",cy);c.setAttribute("r",2.5);
        c.setAttribute("fill","var(--border-strong)");trastero.appendChild(c);
      });
    } else {
      const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
      c.setAttribute("cx",cx);c.setAttribute("cy",294);c.setAttribute("r",2.5);
      c.setAttribute("fill","var(--border-strong)");trastero.appendChild(c);
    }
  });
  const cg=document.getElementById('cuerdas-group');
  cg.innerHTML="";
  const widths=[0.8,1.0,1.2,1.45,1.7,2.0];
  CUERDAS_DATA.forEach((c,i)=>{
    let l=document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1",OFFSET_X);l.setAttribute("y1",c.y);
    l.setAttribute("x2",OFFSET_X+LARGO_CUERDA);l.setAttribute("y2",c.y);
    l.classList.add("cuerda");l.style.strokeWidth=widths[i];
    cg.appendChild(l);
    let t=document.createElementNS("http://www.w3.org/2000/svg","text");
    t.setAttribute("x",OFFSET_X-8);t.setAttribute("y",c.y+4);
    t.textContent=c.nota;t.classList.add("label-cuerda");
    cg.appendChild(t);
  });
}

function renderVisor(midi) {
  const group = document.getElementById('note-group-visor');
  group.innerHTML = "";
  if (!midi) return;
  const d = VISOR_DATA[midi % 12];
  const oct = Math.floor(midi / 12) - 1;
  const yBase = 28.5;

  let mainStep = (oct * 7 + d.s) - (4 * 7 + 6);
  let mainAlt = d.alt;
  let enStep = d.en ? (oct * 7 + d.enS) - (4 * 7 + 6) : null;
  let enAlt = d.enAlt;

  if (direccionVisor === "bajando" && d.en) {
    [mainStep, enStep] = [enStep, mainStep];
    [mainAlt, enAlt] = [enAlt, mainAlt];
  }

  drawVisorNote(50, yBase - (mainStep * 4), mainAlt, false, mainStep);
  if (enStep !== null) drawVisorNote(80, yBase - (enStep * 4), enAlt, true, enStep);
}

function drawVisorNote(x, y, alt, grey, step) {
  const g = document.getElementById('note-group-visor');
  const c = grey ? "#999" : "#1c1b18";
  
  if (alt) {
    const a = document.createElementNS("http://www.w3.org/2000/svg","text");
    a.setAttribute("x", x-12); a.setAttribute("y", y); a.setAttribute("font-size", "18pt");
    a.setAttribute("fill", c); a.textContent = alt; g.appendChild(a);
  }
  const n = document.createElementNS("http://www.w3.org/2000/svg","text");
  n.setAttribute("x", x); n.setAttribute("y", y); n.setAttribute("font-size", "22pt");
  n.setAttribute("fill", c); n.textContent = "\uE0A4"; g.appendChild(n);

  if (step <= -6) {
    for (let s = -6; s >= step; s--) if (Math.abs(s) % 2 === 0) visorLedger(x+7, 28.5 - (s*4), c);
  }
  if (step >= 6) {
    for (let s = 6; s <= step; s++) if (Math.abs(s) % 2 === 0) visorLedger(x+7, 28.5 - (s*4), c);
  }
}

function visorLedger(x, y, c) {
  const l = document.createElementNS("http://www.w3.org/2000/svg","line");
  l.setAttribute("x1", x-10); l.setAttribute("x2", x+5); l.setAttribute("y1", y); l.setAttribute("y2", y);
  l.setAttribute("stroke", c); l.setAttribute("stroke-width", "1");
  document.getElementById('note-group-visor').appendChild(l);
}

function buscarNota(){
  const input=document.getElementById('inputNota').value.trim().toUpperCase();
  const targetMidi=notaToMidi(input);
  const capa=document.getElementById('capa-nodos');
  const showHigh=document.getElementById('checkSuperiores').checked;
  const useTol=document.getElementById('checkCercanos').checked;
  const checkArt=document.getElementById('checkArtificial').checked;

  capa.innerHTML="";
  const idsC=new Set(congelados.map(c=>c.id));
  resultadosActuales=[];

  if(targetMidi){
    renderVisor(targetMidi);
    const TOL=useTol?0.5:0.05;
    CUERDAS_DATA.forEach(cuerda=>{
      SERIE.forEach(arm=>{
        if(arm.p>7&&!showHigh) return;
        const diff=(cuerda.midi+arm.s)-targetMidi;
        if(Math.abs(diff)<=TOL){
          const desv=Math.round(diff*100);
          const px=Math.round(getXRatio(1/arm.p));
          resultadosActuales.push({cuerda,arm,desv,absDesv:Math.abs(desv),type:'nat',dificultad:calcDif(arm.p,px)});
        }
      });
      if(checkArt){
        for(let tP=1;tP<=15;tP++){
          if(tP+12>22) continue;
          if(Math.abs((cuerda.midi+tP+12)-targetMidi)<=0.05)
            resultadosActuales.push({cuerda,traste:tP,type:'art',dificultad:0});
        }
      }
    });
  }

  congelados.forEach(c=>dibujarArmonico(c,true));
  resultadosActuales.forEach(r=>{if(!idsC.has(generarID(r))) dibujarArmonico(r,false);});
  resultadosActuales.sort((a,b)=>(a.absDesv||0)-(b.absDesv||0));
  renderTabla();
}

function dibujarArmonico(r,isFrozen){
  const color=isFrozen?'var(--freeze)':(r.type==='nat'?r.arm.c:'var(--purple-art)');
  if(r.type==='nat'){
    const drawn=new Set();
    for(let n=1;n<r.arm.p;n++){
      if(gcd(n,r.arm.p)===1){
        const xPos=Math.round(getXRatio(n/r.arm.p));
        if(!drawn.has(xPos)){drawNode(xPos,r.cuerda.y,color);drawn.add(xPos);}
      }
    }
  } else {
    drawArt(getX(r.traste),getX(r.traste+12),r.cuerda.y,color);
  }
}

function drawNode(x,y,c){
  const capa=document.getElementById('capa-nodos');
  const tt=12*Math.log2(LARGO_CUERDA/(LARGO_CUERDA-(x-OFFSET_X)));
  const esExacto=Math.abs(tt-Math.round(tt))<0.1;
  if(!esExacto){
    const bar=document.createElementNS("http://www.w3.org/2000/svg","line");
    bar.setAttribute("x1",x);bar.setAttribute("y1",y-13);bar.setAttribute("x2",x);bar.setAttribute("y2",y+13);
    bar.setAttribute("stroke",c);bar.classList.add("guia-vertical");
    capa.appendChild(bar);
  }
  const el=document.createElementNS("http://www.w3.org/2000/svg","circle");
  el.setAttribute("cx",x);el.setAttribute("cy",y);el.setAttribute("r",7);
  el.setAttribute("fill",c);el.classList.add("nodo");
  capa.appendChild(el);
}

function drawArt(xI,xD,y,color){
  const capa=document.getElementById('capa-nodos');
  capa.appendChild(drawHand(xI,y+22,'L',color));
  const p=document.createElementNS("http://www.w3.org/2000/svg","circle");
  p.setAttribute("cx",xI);p.setAttribute("cy",y);p.setAttribute("r",4);
  p.setAttribute("fill","none");p.setAttribute("stroke",color);p.setAttribute("stroke-width","2");
  capa.appendChild(p);
  capa.appendChild(drawHand(xD,y+22,'R',color));
  const l=document.createElementNS("http://www.w3.org/2000/svg","line");
  l.setAttribute("x1",xD);l.setAttribute("y1",y-12);l.setAttribute("x2",xD);l.setAttribute("y2",y+12);
  l.classList.add("guia-90");l.style.stroke=color;
  capa.appendChild(l);
  const ci=document.createElementNS("http://www.w3.org/2000/svg","circle");
  ci.setAttribute("cx",xD);ci.setAttribute("cy",y);ci.setAttribute("r",7);
  ci.setAttribute("fill",color);ci.classList.add("nodo");
  capa.appendChild(ci);
}

function drawHand(x,y,t,color){
  const g=document.createElementNS("http://www.w3.org/2000/svg","g");
  const p=document.createElementNS("http://www.w3.org/2000/svg","path");
  p.classList.add("icono-mano");p.setAttribute("stroke",color);
  p.setAttribute("d",t==='L'?`M${x-4},${y} a4,4 0 0,1 8,0`:`M${x-4},${y} l8,0 M${x},${y} l0,-5`);
  g.appendChild(p);return g;
}

function calcDif(parcial,x){
  const tt=12*Math.log2(LARGO_CUERDA/(LARGO_CUERDA-(x-OFFSET_X)));
  const esExacto=Math.abs(tt-Math.round(tt))<0.1;
  if(esExacto&&parcial<=4) return 0;
  let n=1;
  if(tt>13||parcial>8) n=2;
  if(tt>17&&parcial>9) n=3;
  return n;
}

function toggleFreeze(id){
  const idx=congelados.findIndex(c=>c.id===id);
  if(idx>-1){ congelados.splice(idx,1); }
  else {
    const item=resultadosActuales.find(r=>generarID(r)===id);
    if(item){
      const nota=document.getElementById('inputNota').value.trim().toUpperCase();
      congelados.push({...item,id,notaObjetivo:nota});
    }
  }
  buscarNota();
}

function borrarCongelados(){congelados=[];buscarNota();}

function renderTabla(){
  const box=document.getElementById('infoBox');
  const idsC=new Set(congelados.map(c=>c.id));
  const rows=[
    ...congelados.map(r=>buildRow(r,true)),
    ...resultadosActuales.filter(r=>!idsC.has(generarID(r))).map(r=>buildRow(r,false))
  ];
  if(!rows.length){
    box.innerHTML=`<div class="empty-state"><span style="font-size:22px;opacity:.3">♩</span><span>Sin armónicos para esta nota</span></div>`;
    return;
  }
  box.innerHTML=rows.join('');
}

function buildRow(r,frozen){
  const id=frozen?r.id:generarID(r);
  const fc=frozen?' frozen':'';
  const ba=frozen?' on':'';
  const tag=frozen?`<span class="frozen-tag">${r.notaObjetivo}</span> `:'';
  const diffHTML=r.dificultad>0?`<div class="diff-dots">${'<div class="diff-dot"></div>'.repeat(r.dificultad)}</div>`:'';

  if(r.type==='nat'){
    const cc=frozen?'var(--freeze)':getCentsColor(r.desv);
    const cbg=frozen?'#cffafe':'var(--surface-2)';
    const cs=(r.desv>0?'+':'')+r.desv+'¢';
    return `<div class="result-row${fc}">
      <button class="freeze-btn${ba}" onclick="toggleFreeze('${id}')" title="${frozen?'Descongelar':'Congelar'}">${snowSVG}</button>
      <div class="row-body">
        <div class="row-main">${tag}Cuerda <b>${r.cuerda.nota}</b> · P${r.arm.p} <span style="opacity:.6;font-size:11px">(${r.arm.frac})</span></div>
        <div class="row-sub">${r.arm.n}</div>
      </div>
      <div class="row-right">
        ${diffHTML}
        <span class="sym" style="color:${frozen?'var(--freeze)':r.arm.c}">${r.arm.sym}</span>
        <span class="cents" style="color:${cc};background:${cbg}">${cs}</span>
      </div>
    </div>`;
  } else {
    const ac=frozen?'var(--freeze)':'var(--purple-art)';
    return `<div class="result-row${fc}">
      <button class="freeze-btn${ba}" onclick="toggleFreeze('${id}')" title="${frozen?'Descongelar':'Congelar'}">${snowSVG}</button>
      <div class="row-body">
        <div class="row-main">${tag}Art. 8.ª en <b>${r.cuerda.nota}</b> · Tr. ${r.traste}</div>
        <div class="row-sub">Armónico artificial</div>
      </div>
      <div class="row-right">
        <span class="sym" style="color:${ac}">\uE261</span>
        <span class="cents">0¢</span>
      </div>
    </div>`;
  }
}

// Navegación con flechas
window.addEventListener("keydown", (e)=>{
    if (e.key === "ArrowUp" || e.key === "ArrowDown") {
        e.preventDefault();
        let input = document.getElementById('inputNota');
        let m = notaToMidi(input.value.trim());
        if(!m) return;
        if(e.key === "ArrowUp") { m++; direccionVisor = "subiendo"; }
        else { m--; direccionVisor = "bajando"; }
        const nNames=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
        let nueva = nNames[m%12] + (Math.floor(m/12)-1);
        input.value = nueva;
        lastMidiVisor = m;
        buscarNota();
        highlightKey(nueva);
    }
});

init();
