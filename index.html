<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tesauro Armónico · Guitarra</title>

<style>
/* ══════════════════════════════════════════════
   TESAURO ARMÓNICO · CONTEMPORARY EDITION
   Inspired by Darmstädter Ferienkurse
══════════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap');

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface-2: #f0efeb;
  --border: #d8d6d0;
  --border-strong: #a0a09a;
  --text: #0a0a08;
  --text-2: #4a4a46;
  --text-3: #8a8a84;
  --accent: #c8001e;
  --accent-subtle: #fff0f2;
  --accent-2: #0a0a08;
  --purple-art: #4a0080;
  --freeze: #005080;
  --freeze-bg: #e8f4ff;
  --c-p2: #007a3d;
  --c-p5: #c8001e;
  --c-p7: #0047ab;
  --c-alert: #c8001e;
  --c-oct: #007a3d;
  --c-5th: #9a6000;
  --c-3M:  #c8001e;
  --c-7m:  #0047ab;
  --c-6m:  #6a0070;
  --c-7M:  #a0004a;
  --c-2M:  #5a5a54;
  --c-4a:  #005070;
  --c-2m:  #804010;
  --c-3m:  #006030;
  --fret: #b8b4a8;
  --string: #c8c4b8;
  --nut: #2a2a24;
  --node-grey: #c0beb8;
  --radius: 0px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Barlow', system-ui, sans-serif;
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
@font-face {
  font-family: 'Bravura';
  src: url('fonts/Bravura.woff2') format('woff2');
  font-weight: normal; font-style: normal; font-display: block;
}

/* ── Layout ── */
.app { height: 100vh; display: grid; grid-template-rows: auto auto 1fr; overflow: hidden; }

/* ── Header ── */
.header {
  padding: 10px 28px 0;
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0; user-select: none;
  border-bottom: 2px solid var(--text);
  padding-bottom: 8px;
}
.header h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}
.header h1 em {
  font-style: normal;
  font-weight: 300;
  letter-spacing: 0.12em;
  color: var(--accent);
}
.header-version {
  font-size: 9px;
  color: var(--text-3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-family: 'Barlow Condensed', sans-serif;
}

/* ── Top bar ── */
.top-bar {
  padding: 8px 28px 10px;
  display: flex; align-items: center; gap: 18px;
  flex-wrap: nowrap;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--surface);
}
.nota-wrap { position: relative; margin-top: 12px; }
.nota-label {
  position: absolute; top: -13px; left: 0;
  font-size: 9px; font-weight: 600;
  color: var(--text-3);
  letter-spacing: 0.12em;
  text-transform: uppercase;
  font-family: 'Barlow Condensed', sans-serif;
}
#inputNota {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 32px;
  font-weight: 700;
  letter-spacing: 0.02em;
  color: var(--text);
  background: transparent;
  border: none;
  border-bottom: 2px solid var(--text);
  width: 90px;
  padding: 2px 4px 2px;
  outline: none;
  transition: border-color .15s;
  text-align: center;
  text-transform: uppercase;
}
#inputNota:focus { border-bottom-color: var(--accent); color: var(--accent); }
.divider { width: 1px; height: 32px; background: var(--border); flex-shrink: 0; }

/* Piano */
.piano-outer { overflow-x: auto; overflow-y: hidden; scrollbar-width: none; flex: 1; min-width: 0; }
.piano-outer::-webkit-scrollbar { display: none; }
.piano-keys { display: flex; align-items: flex-start; height: 36px; padding: 0 2px; }
.key { flex-shrink: 0; cursor: pointer; transition: background .1s; user-select: none; position: relative; }
.key.white {
  width: 17px; height: 36px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 1px 1px;
  display: flex; align-items: flex-end; justify-content: center; padding-bottom: 2px;
}
.key.white:hover { background: var(--surface-2); }
.key.white.active { background: var(--accent-subtle); border-color: var(--accent); }
.key.white.active::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 3px; background: var(--accent);
}
.key.black {
  width: 11px; height: 22px;
  background: var(--text);
  border-radius: 0 0 1px 1px;
  margin: 0 -5.5px; z-index: 2;
}
.key.black:hover { background: #2a2a24; }
.key.black.active { background: var(--accent); }
.middle-c-dot {
  width: 3px; height: 3px; border-radius: 50%;
  background: var(--accent); margin-bottom: 4px;
}

/* Visor */
.visor-container {
  width: 120px; height: 80px;
  background: var(--surface);
  border: 1px solid var(--border);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  overflow: visible;
}

/* Checks */
.checks-wrap {
  display: grid;
  grid-template-columns: repeat(3, auto);
  gap: 4px;
  flex-shrink: 0;
  align-items: center;
}
.check-pill {
  display: flex; align-items: center; gap: 5px; cursor: pointer;
  padding: 4px 10px;
  border: 1px solid var(--border);
  transition: all .12s; user-select: none; white-space: nowrap;
  background: var(--surface);
  border-radius: 0;
}
.check-pill:hover { border-color: var(--text); }
.check-pill:has(input:checked) {
  background: var(--text);
  border-color: var(--text);
  color: var(--surface);
}
.check-pill input[type="checkbox"] {
  appearance: none; width: 11px; height: 11px;
  border: 1.5px solid var(--border-strong);
  cursor: pointer;
  display: grid; place-content: center;
  flex-shrink: 0; transition: all .12s; background: white;
}
.check-pill:has(input:checked) input[type="checkbox"] {
  background: var(--accent); border-color: var(--accent);
}
.check-pill:has(input:checked) input[type="checkbox"]::before {
  content: ''; width: 6px; height: 6px;
  clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
  background: white;
}
.check-pill label { font-size: 11px; font-weight: 600; cursor: pointer; pointer-events: none; letter-spacing: 0.06em; text-transform: uppercase; font-family: 'Barlow Condensed', sans-serif; }
.btn-disabled { opacity: 0.3; pointer-events: none; }
.btn-reset {
  width: 26px; height: 26px; background: none;
  border: 1px solid var(--border);
  cursor: pointer; display: inline-flex; align-items: center;
  justify-content: center; color: var(--text-3);
  transition: all .12s; padding: 0; flex-shrink: 0;
}
.btn-reset:hover { border-color: var(--text); color: var(--text); }

/* ── Main ── */
.main { display: grid; grid-template-columns: 1fr 290px; overflow: visible; min-height: 0; position: relative; }

/* ── Fretboard ── */
.fretboard-wrap { display: flex; flex-direction: column; overflow: hidden; background: var(--bg); position: relative; }
.fretboard-svg-area { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; touch-action: none; min-height: 0; }
#mastil { width: 1000px; height: auto; flex-shrink: 0; transform-origin: center center; transform: translate(var(--pan-x,0px),var(--pan-y,0px)) scale(var(--zoom,1)); transition: transform .05s ease-out; display: block; }

/* ── Globos footer ── */
#globos-footer {
  height: 0; overflow: visible; position: relative;
  flex-shrink: 0; transition: height .3s cubic-bezier(.4,0,.2,1);
  pointer-events: none; z-index: 20;
}
#globos-footer.active { height: 210px; pointer-events: all; }
#globos-scroll {
  position: fixed; bottom: 0; left: 0; right: 0; height: 210px;
  z-index: 50; display: flex; align-items: flex-end;
  gap: 8px; padding: 0 20px 14px;
  overflow-x: auto; overflow-y: visible;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  scroll-behavior: smooth;
}
#globos-scroll::-webkit-scrollbar { height: 3px; }
#globos-scroll::-webkit-scrollbar-thumb { background: var(--border); }

/* Flechas de scroll */
.scroll-arrow {
  position: absolute; top: 50%; transform: translateY(-50%); z-index: 10;
  width: 24px; height: 48px;
  background: var(--surface); border: 1px solid var(--border);
  font-size: 18px; color: var(--text-2); cursor: pointer;
  display: none; align-items: center; justify-content: center;
  transition: color .15s; padding: 0;
}
.scroll-arrow:hover { color: var(--text); }
.scroll-arrow.visible { display: flex; }
.scroll-arrow-left  { left: 4px; }
.scroll-arrow-right { right: 4px; }

/* ── Globo card ── */
.globo-card {
  flex-shrink: 0; width: 193px; height: 193px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-top: 3px solid var(--text);
  display: flex; flex-direction: column;
  overflow: hidden;
  transition: border-color .15s, box-shadow .15s;
  cursor: default; position: relative;
}
.globo-card:hover { border-top-color: var(--accent); }
.globo-card.focused { border-top-color: var(--accent); border-color: var(--accent); }

.globo-head {
  display: flex; height: 26px;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.globo-head-frac {
  flex: 1; display: flex; align-items: center; justify-content: center;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px; font-weight: 700; letter-spacing: 0.04em;
  color: var(--text); background: var(--surface-2);
  border-right: 1px solid var(--border);
}
.globo-head-dist {
  flex: 1.2; display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: var(--text-3); background: var(--surface-2); gap: 2px;
}
.globo-head-dist b { color: var(--text-2); font-weight: 700; font-size: 11px; font-family: 'Barlow Condensed', sans-serif; }

.globo-actions { display: flex; height: 22px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.globo-btn {
  flex: 1; background: white; border: none;
  font-size: 7px; font-family: 'Barlow Condensed', sans-serif;
  font-weight: 700; letter-spacing: .10em; text-transform: uppercase;
  color: var(--text-3); cursor: pointer; transition: all .12s;
}
.globo-btn + .globo-btn { border-left: 1px solid var(--border); }
.globo-btn:hover { background: var(--surface-2); color: var(--text); }
.globo-btn.active { background: var(--text); color: white; }

.globo-body { flex: 1; position: relative; overflow: hidden; }
.globo-notation svg { overflow: visible !important; }
.globo-notation {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  padding: 4px 6px; transition: opacity .2s; overflow: visible;
}
.globo-notation svg { width: 100%; height: 100%; overflow: visible; }
.globo-details {
  position: absolute; inset: 0; padding: 8px 10px;
  display: flex; flex-direction: column; gap: 5px;
  justify-content: center; opacity: 0; pointer-events: none;
  transition: opacity .2s; background: var(--surface-2);
}
.globo-details.visible { opacity: 1; pointer-events: all; }
.globo-notation.hidden { opacity: 0; pointer-events: none; }

/* Barra cents */
.cents-bar-wrap { display: flex; flex-direction: column; gap: 3px; }
.cents-label { display: flex; justify-content: space-between; font-size: 8px; color: var(--text-3); letter-spacing: .10em; text-transform: uppercase; font-family: 'Barlow Condensed', sans-serif; }
.cents-val { font-size: 13px; font-weight: 700; font-family: 'Barlow Condensed', sans-serif; }
.cents-val.neg { color: var(--c-p7); }
.cents-val.pos { color: var(--c-p5); }
.cents-val.zero { color: var(--c-p2); }
.cents-track { height: 4px; background: var(--border); position: relative; overflow: hidden; }
.cents-fill { position: absolute; top: 0; height: 100%; }
.cents-fill.neg { background: var(--c-p7); right: 50%; }
.cents-fill.pos { background: var(--c-p5); left: 50%; }
.cents-center-mark { position: absolute; left: 50%; top: -1px; width: 1px; height: calc(100% + 2px); background: var(--border-strong); transform: translateX(-50%); }
.dist-rows { display: flex; flex-direction: column; gap: 3px; margin-top: 2px; }
.dist-row { display: flex; justify-content: space-between; align-items: center; font-size: 10px; }
.dist-row-label { color: var(--text-3); font-size: 8px; text-transform: uppercase; letter-spacing: .06em; font-family: 'Barlow Condensed', sans-serif; }
.dist-row-val { font-weight: 700; color: var(--text); font-family: 'Barlow Condensed', monospace; font-size: 12px; }
.dist-row-unit { color: var(--text-3); font-size: 8px; }
.globo-sounding { font-size: 9px; color: var(--text-3); text-align: center; margin-top: 2px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: .06em; }

/* ── SVG classes ── */
.cuerda { stroke: var(--string); }
.label-cuerda { font-size: 10px; text-anchor: end; fill: var(--text-2); font-weight: 700; font-family: 'Barlow Condensed', sans-serif; cursor: pointer; user-select: none; transition: fill .12s; letter-spacing: 0.04em; }
.label-cuerda:hover { fill: var(--accent); }
.label-cuerda.cuerda-fija { fill: #0070c0; font-weight: bold; filter: drop-shadow(0 0 2px #0070c0); }
.label-romano { font-size: 8px; fill: var(--text-3); text-anchor: middle; font-weight: 600; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.06em; }
.traste-metal { stroke: var(--fret); stroke-width: 1.5; }
.cejuela { stroke: var(--nut); stroke-width: 3; }
.nodo { stroke: white; stroke-width: 0.8; cursor: pointer; }
.nodo.greyed { fill: var(--node-grey) !important; stroke: white; }
.nodo.pulsing { animation: nodoPulse .6s ease-out; }
.guia-vertical { stroke-width: 0.6; stroke-dasharray: 0.8,0.4; opacity: .85; }
.guia-90 { stroke-width: 1; stroke-dasharray: 3,3; stroke: var(--purple-art); opacity: .6; }
.icono-mano { fill: none; stroke-width: 1.5; stroke-linecap: round; }
#guitar-contour path { stroke: var(--fret) !important; }


@keyframes nodoPulse { 0% { r:7; opacity:1; } 40% { r:13; opacity:.5; } 100% { r:7; opacity:1; } }

/* ── Side panel ── */
.side-panel {
  position: relative; z-index: 10;
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  background: var(--surface);
}
.panel-top {
  padding: 10px 14px 8px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; display: flex;
  align-items: center; justify-content: space-between; gap: 10px;
}
.panel-label {
  font-size: 9px; font-weight: 700; color: var(--text-3);
  letter-spacing: .12em; text-transform: uppercase;
  font-family: 'Barlow Condensed', sans-serif;
}
.legend { display: flex; flex-wrap: wrap; gap: 5px 8px; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-2); font-family: 'Barlow Condensed', sans-serif; font-weight: 500; }
.dot { width: 6px; height: 6px; flex-shrink: 0; }
.results-list { overflow-y: auto; flex: 1; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
.results-list::-webkit-scrollbar { width: 3px; }
.results-list::-webkit-scrollbar-thumb { background: var(--border); }
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 6px; color: var(--text-3); font-size: 12px; padding: 20px; text-align: center; font-family: 'Barlow Condensed', sans-serif; letter-spacing: .06em; }
.result-row {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px;
  border-bottom: 1px solid var(--border);
  transition: background .1s; cursor: pointer;
}
.result-row:last-child { border-bottom: none; }
.result-row:hover { background: var(--surface-2); }
.result-row.frozen { background: #eef4ff; }
.result-row.selected { background: #fff0f2; border-left: 3px solid var(--accent); }
.freeze-btn { width: 20px; height: 20px; border: none; background: none; cursor: pointer; padding: 0; display: grid; place-content: center; flex-shrink: 0; color: var(--text-3); transition: all .12s; }
.freeze-btn:hover { color: var(--freeze); }
.freeze-btn.on { color: var(--freeze); }
.freeze-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }
.row-body { flex: 1; min-width: 0; }
.row-main { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'Barlow Condensed', sans-serif; font-weight: 600; letter-spacing: 0.02em; }
.row-main b { font-weight: 800; }
.row-sub { font-size: 10px; color: var(--text-3); margin-top: 1px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.04em; text-transform: uppercase; }
.row-right { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.diff-dots { display: flex; gap: 2px; }
.diff-dot { width: 4px; height: 4px; background: var(--c-alert); opacity: .5; }
.cents-badge {
  font-family: 'Barlow Condensed', monospace;
  font-size: 12px; font-weight: 700;
  padding: 2px 5px;
  background: var(--surface-2);
  min-width: 34px; text-align: center;
  letter-spacing: 0.02em;
}
.frozen-tag { font-size: 8px; font-weight: 800; letter-spacing: .10em; text-transform: uppercase; color: var(--freeze); background: #ddeeff; padding: 1px 4px; }
.sym { font-family: 'Bravura', serif; font-size: 22px; line-height: 1; width: 22px; text-align: center; flex-shrink: 0; }

/* Responsive */
@media (min-width: 1280px) { .main { grid-template-columns: 1fr 320px; } }
@media (max-width: 860px) {
  .main { grid-template-columns: 1fr; grid-template-rows: 1fr auto; }
  .side-panel { border-left: none; border-top: 1px solid var(--border); max-height: 220px; }
  .divider { display: none; }
}
@media (max-width: 600px) {
  .app { grid-template-rows: auto auto 1fr auto; height: 100dvh; }
  .header { padding: 8px 14px 0; }
  .header h1 { font-size: 16px; }
  .header-version { display: none; }
  .top-bar { padding: 8px 14px; flex-wrap: wrap; gap: 8px; }
  #inputNota { font-size: 24px; width: 70px; }
  .piano-outer { order: 3; width: 100%; flex: none; }
  .visor-container { width: 90px; height: 60px; order: 2; }
  .checks-wrap { order: 4; width: 100%; grid-template-columns: repeat(3, 1fr); gap: 3px; }
  .check-pill { padding: 4px 6px; justify-content: center; }
  .divider { display: none; }
  .globo-card { width: 160px; height: 160px; }
  #globos-footer.active { height: 175px; }
  #globos-scroll { height: 175px; padding: 0 12px 12px; gap: 6px; }
  #config-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200; }
}

/* ── Config panel ── */
.btn-menu {
  background: none; border: none; cursor: pointer;
  padding: 5px 8px; color: var(--text-2);
  font-size: 18px; line-height: 1;
  transition: color .12s;
}
.btn-menu:hover { color: var(--text); }

#config-panel {
  position: absolute; top: 0; right: 0; bottom: 0; left: 0;
  background: var(--surface); z-index: 100;
  transform: translateX(100%);
  transition: transform .25s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
}
#config-panel.open { transform: translateX(0); }
.config-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px 10px; border-bottom: 2px solid var(--text);
}
.config-header h3 {
  font-size: 13px; font-weight: 800; color: var(--text); margin: 0;
  font-family: 'Barlow Condensed', sans-serif; letter-spacing: .12em; text-transform: uppercase;
}
.config-close { background: none; border: none; cursor: pointer; font-size: 16px; color: var(--text-3); padding: 2px 6px; }
.config-close:hover { color: var(--text); }
.config-body { padding: 16px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
.config-section { display: flex; flex-direction: column; gap: 8px; }
.config-label {
  font-size: 9px; font-weight: 800; letter-spacing: .12em;
  text-transform: uppercase; color: var(--text-3);
  font-family: 'Barlow Condensed', sans-serif;
  border-bottom: 1px solid var(--border); padding-bottom: 4px;
}
.config-options { display: flex; gap: 4px; }
.config-opt {
  flex: 1; padding: 7px 10px; border: 1px solid var(--border);
  background: var(--surface); cursor: pointer;
  font-size: 11px; font-weight: 700; color: var(--text-2);
  text-align: center; transition: all .12s;
  font-family: 'Barlow Condensed', sans-serif; letter-spacing: .06em; text-transform: uppercase;
}
.config-opt:hover { border-color: var(--text); color: var(--text); }
.config-opt.active { background: var(--text); color: white; border-color: var(--text); }
.config-toggle {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 10px; border: 1px solid var(--border); cursor: pointer;
}
.config-toggle span { font-size: 11px; color: var(--text-2); font-family: 'Barlow Condensed', sans-serif; letter-spacing: .04em; }
.toggle-switch {
  width: 34px; height: 18px; background: var(--border);
  position: relative; transition: background .2s;
}
.toggle-switch.on { background: var(--text); }

}

<script>
'use strict';

// ══════════════════════════════════════════════════════════════
// MOTOR EXTENDED HELMHOLTZ-ELLIS
// ══════════════════════════════════════════════════════════════
const HARMONICS_HE = {
  1:{name:'Unísono',         cents:0,   limit:1},
  2:{name:'Octava',          cents:0,   limit:2},
  3:{name:'5.ª justa',       cents:2,   limit:3},
  4:{name:'2.ª octava',      cents:0,   limit:2},
  5:{name:'3.ª mayor',       cents:-14, limit:5},
  6:{name:'5.ª 2.ª oct.',     cents:2,   limit:3},
  7:{name:'7.ª men. sept.',  cents:-31, limit:7},
  8:{name:'3.ª octava',      cents:0,   limit:2},
  9:{name:'9.ª (2.ª may.)',   cents:4,   limit:3},
 10:{name:'3.ª mayor oct+',  cents:-14, limit:5},
 11:{name:'4.ª aum. undec.', cents:-49, limit:11},
 12:{name:'5.ª oct+',        cents:2,   limit:3},
 13:{name:'6.ª men. tridec.',cents:41,  limit:13},
 14:{name:'7.ª men. sept.',  cents:-31, limit:7},
 15:{name:'7.ª mayor',       cents:-12, limit:5},
 16:{name:'4.ª octava',      cents:0,   limit:2},
 17:{name:'2.ª men. 17-lím.', cents:5,   limit:17},
 18:{name:'9.ª (2.ª may.)',   cents:4,   limit:3},
 19:{name:'3.ª men. 19-lím.', cents:-2,  limit:19},
 20:{name:'3.ª mayor oct+',   cents:-14, limit:5},
 21:{name:'7.ª men. sept.',   cents:-29, limit:7},
 22:{name:'4.ª aum. undec.',  cents:-49, limit:11},
};

const NPC = { // nota → pitch class
  'C':0,'C#':1,'DB':1,'D':2,'D#':3,'EB':3,'E':4,
  'F':5,'F#':6,'GB':6,'G':7,'G#':8,'AB':8,
  'A':9,'A#':10,'BB':10,'B':11,
  'DO':0,'DO#':1,'REB':1,'RE':2,'RE#':3,'MIB':3,'MI':4,
  'FA':5,'FA#':6,'SOLB':6,'SOL':7,'SOL#':8,'LAB':8,
  'LA':9,'LA#':10,'SIB':10,'SI':11
};
const STEP_SH = [0,0,1,1,2,3,3,4,4,5,5,6];
const STEP_FL = [0,1,1,2,2,3,4,4,5,5,6,6];
const NAME_SH = ['Do','Do♯','Re','Re♯','Mi','Fa','Fa♯','Sol','Sol♯','La','La♯','Si'];
const NAME_FL = ['Do','Re♭','Re','Mi♭','Mi','Fa','Sol♭','Sol','La♭','La','Si♭','Si'];
const ACC_PCS = new Set([1,3,6,8,10]);

// Glifos 5-límite (ya incluyen accidental cromático)
const G5D  = {dblflat:'\uE2C0',flat:'\uE2C1',nat:'\uE2C2',sharp:'\uE2C3',dblsharp:'\uE2C4'};
const G5U  = {dblflat:'\uE2C5',flat:'\uE2C6',nat:'\uE2C7',sharp:'\uE2C8',dblsharp:'\uE2C9'};
const G5D2 = {dblflat:'\uE2CA',flat:'\uE2CB',nat:'\uE2CC',sharp:'\uE2CD',dblsharp:'\uE2CE'};
const G5U2 = {dblflat:'\uE2CF',flat:'\uE2D0',nat:'\uE2D1',sharp:'\uE2D2',dblsharp:'\uE2D3'};

function getHESpec(pc, cents, limit, preferFlat) {
  const isAcc = ACC_PCS.has(pc);
  const dir   = cents < 0 ? 'down' : cents > 0 ? 'up' : null;
  const abs   = Math.abs(cents);
  const bKey  = isAcc ? (preferFlat ? 'flat' : 'sharp') : 'nat';
  const bChar = isAcc ? (preferFlat ? '\uE260' : '\uE262') : null;
  if (!dir) return {heChar:null, baseChar:bChar};
  if (limit===5 && abs>=11 && abs<=22) return {heChar:(dir==='down'?G5D:G5U)[bKey], baseChar:null};
  if (limit===5 && abs>=28 && abs<=50) return {heChar:(dir==='down'?G5D2:G5U2)[bKey], baseChar:null};
  if (limit===7 && abs>=27 && abs<=35) return {heChar:dir==='down'?'\uE2DE':'\uE2DF', baseChar:bChar};
  if (limit===7 && abs>=55 && abs<=70) return {heChar:dir==='down'?'\uE2E0':'\uE2E1', baseChar:bChar};
  if (limit===11&& abs>=40 && abs<=55) return {heChar:dir==='down'?'\uE2E2':'\uE2E3', baseChar:bChar};
  if (limit===13&& abs>=35 && abs<=48) return {heChar:dir==='down'?'\uE2E4':'\uE2E5', baseChar:bChar};
  if (limit===17&& abs>=2  && abs<=9 ) return {heChar:dir==='down'?'\uE2E6':'\uE2E7', baseChar:bChar};
  if (limit===19&& abs>=1  && abs<=4 ) return {heChar:dir==='down'?'\uE2E8':'\uE2E9', baseChar:bChar};
  return {heChar:null, baseChar:bChar};
}

function normNote(name) {
  // Eliminar el número de octava al final (ej: "E2" → "E", "Bb4" → "BB")
  const s = name.toUpperCase()
    .replace(/IS$/,'#').replace(/ES$/,'B')
    .replace('♯','#').replace('♭','B');
  // Quitar dígito final si lo hay (octava)
  return s.replace(/\d+$/, '');
}

// Calcula spec HE y nombre de nota para fund+parcial.
// Recibe midiCuerda (MIDI real de la cuerda abierta) para calcular la octava real.
function calcHE(fundName, parcial, midiCuerda) {
  const norm  = normNote(fundName);
  // 'B' sola = Si natural (inglés), no bemol. Bemol solo si hay nota antes: DB, EB, GB, AB, BB.
  const pref  = /[A-Z]B$/.test(norm) && !norm.includes('#');
  const pc0   = NPC[norm];
  if (pc0 === undefined) return null;

  // Si tenemos el MIDI real de la cuerda, usarlo; si no, inferir desde el nombre
  let midiF;
  if (midiCuerda !== undefined) {
    midiF = midiCuerda;
  } else {
    // Inferir: buscar el pc0 en la octava más cercana a 4
    midiF = pc0 + 5*12;
  }

  const midiR = Math.round(12*Math.log2(440*Math.pow(2,(midiF-69)/12)*parcial/440)+69);
  const pcR   = midiR % 12;
  const oct   = Math.floor(midiR/12)-1;
  const hd    = HARMONICS_HE[parcial] || {cents:0,limit:1};
  const spec  = getHESpec(pcR, hd.cents, hd.limit, pref);
  const name  = (pref ? NAME_FL : NAME_SH)[pcR] + oct;
  return {spec, pcRes:pcR, midi:midiR, name, pref, cents:hd.cents};
}

// renderHESVG — dibuja nota HE con detección de colisiones y contención en viewBox.
function renderHESVG(gEl, midi, spec, preferFlat, stringGlyph, fretNum, showCents, centsVal, useMidiDirect) {
  if (!gEl) return;
  while (gEl.firstChild) gEl.removeChild(gEl.firstChild);

  const svgNS = 'http://www.w3.org/2000/svg';
  const YBASE=80, SPX=5, MI4DS=30;

  // ── Normalización de octava ──────────────────────────────────
  const pcN = ((midi%12)+12)%12;
  const stepN = preferFlat ? STEP_FL[pcN] : STEP_SH[pcN];
  let fromE4 = (Math.floor(midi/12)-1)*7 + stepN - MI4DS;
  let octavasDown = 0;
  const LIMITE = showCents ? 8 : 12;
  while (fromE4 > LIMITE) { fromE4 -= 7; octavasDown++; }
  while (fromE4 < -8)     { fromE4 += 7; }
  const needsOttava = octavasDown > 0;
  const ottGlyph    = octavasDown >= 2 ? '\uE515' : '\uE511';

  const y  = YBASE - fromE4*SPX;
  const nx = 60;
  const stemUp = fromE4 <= 4;

  // ── Helpers SVG ──────────────────────────────────────────────
  function mkt(x,ty,ch,fill,fsz,ff) {
    const t=document.createElementNS(svgNS,'text');
    t.setAttribute('x',String(x)); t.setAttribute('y',String(ty));
    t.setAttribute('font-family',ff||'Bravura,serif');
    t.setAttribute('font-size',fsz||'20px'); t.setAttribute('fill',fill);
    t.textContent=ch; return t;
  }
  function mkl(x1,x2,ly) {
    const l=document.createElementNS(svgNS,'line');
    l.setAttribute('x1',String(x1));l.setAttribute('x2',String(x2));
    l.setAttribute('y1',String(ly));l.setAttribute('y2',String(ly));
    l.setAttribute('stroke','#aaa');l.setAttribute('stroke-width','0.8');
    return l;
  }

  // ── Sistema de colisiones ─────────────────────────────────────
  // Cada caja: [x1,y1,x2,y2]
  const placed = [];
  function hits(b) { return placed.some(p=>b[0]<p[2]&&b[2]>p[0]&&b[1]<p[3]&&b[3]>p[1]); }
  function inVB(b) { return b[0]>=-4&&b[2]<=99&&b[1]>=-4&&b[3]<=124; }
  function reg(b)  { placed.push(b); return b; }

  // Intentar posición; si colisiona, desplazar en dirección preferida
  function resolve(box, dx, dy, steps) {
    let b=[...box];
    for(let i=0;i<steps;i++) {
      if(!hits(b) && inVB(b)) return b;
      b=[b[0]+dx, b[1]+dy, b[2]+dx, b[3]+dy];
    }
    return box; // fallback a posición original
  }

  // ── 1. Ledger lines ──────────────────────────────────────────
  if (fromE4>=10) for(let s=10;s<=fromE4;s+=2) gEl.appendChild(mkl(nx-6,nx+14,YBASE-s*SPX));
  if (fromE4<=-2) for(let s=-2;s>=fromE4;s-=2) gEl.appendChild(mkl(nx-6,nx+14,YBASE-s*SPX));

  // ── 2. Anclas: cabeza y plica (no se mueven) ─────────────────
  reg([nx-2, y-14, nx+14, y+2]);  // cabeza (margen real hacia arriba)
  if (stemUp) reg([nx+8, y-32, nx+14, y]);   // plica arriba
  else        reg([nx-2, y,    nx+4,  y+32]); // plica abajo

  // ── 3. Accidentales (izquierda de la cabeza) ─────────────────
  const hasHE   = !!(spec && spec.heChar);
  const hasBase = !!(spec && spec.baseChar);
  let accLeft = nx - 10; // borde izquierdo disponible

  if (hasBase) {
    let bx = accLeft - 14;
    const b = resolve([bx, y-18, bx+12, y+2], -3, 0, 10);
    reg(b); accLeft = b[0]-2;
    gEl.appendChild(mkt(b[0], y, spec.baseChar, '#444', '40px'));
  }
  if (hasHE) {
    let hx = accLeft - 14;
    const b = resolve([hx, y-14, hx+12, y+2], -3, 0, 10);
    reg(b); accLeft = b[0]-2;
    gEl.appendChild(mkt(b[0], y, spec.heChar, '#c8502a', '40px'));
  }

  // ── 4. Glifo armónico  — registrar ANTES del 8va
  if (stringGlyph !== undefined && stringGlyph !== null) {
    const hx = nx + 2.8;
    let hb;
    if (stemUp) {
      // Plica arriba → círculo DEBAJO de la cabeza
      const hy = Math.max(YBASE + 8, y + 12);
      hb = [hx-4, hy-16, hx+14, hy+4];
      hb = resolve(hb, 0, +2, 20);
    } else {
      // Plica abajo → círculo ENCIMA de la cabeza
      const hy = Math.max(2, y - 16);
      hb = [hx-4, hy-16, hx+14, hy+4];
      hb = resolve(hb, 0, -2, 20);
    }
    reg(hb);
    gEl.appendChild(mkt(hx, hb[3]-2, '', '#555', '22px'));
  }

  // ── 5. Cabeza y plica ────────────────────────────────────────
  const stX = stemUp ? (showCents ? nx+10.45 : nx+9.2) : nx;
  gEl.appendChild(mkt(stX, y, stemUp?'\uE93E':'\uE93F', '#111', '40px'));
  gEl.appendChild(mkt(nx,  y, showCents?'\uE0A4':'\uE0DD', '#111', '40px'));

  // ── 6. Cents (Altura) ────────────────────────────────────────
  if (showCents && centsVal !== undefined && centsVal !== 0) {
    const cs=(centsVal>0?'+':'')+centsVal+'¢';
    const b=[nx+14, y-10, nx+32, y];
    reg(b);
    const ct=mkt(b[0], y-4, cs, centsVal<0?'#2563eb':'#ea580c', '7px', 'Inter,sans-serif');
    ct.setAttribute('font-weight','600'); gEl.appendChild(ct);
  }

  // ── 7. Glifo 8va / 15ma — registrar DESPUÉS del círculo (lo evita hacia arriba)
  // Si nota muy alta (y<30, plica abajo): 8va a la izquierda para dejar espacio al círculo
  if (needsOttava) {
    const ow = ottGlyph==='' ? 26 : 20;
    let ox, oy;
    if (y < 30 && !stemUp) {
      // Nota alta con plica abajo: 8va a la izquierda de la cabeza
      ox = nx - 28; oy = y - 4;
    } else {
      ox = nx - 6; oy = Math.max(4, y - 28);
    }
    let ob = [ox, oy-2, ox+ow, oy+12];
    if (hits(ob)) {
      const ob0 = [...ob];  // guardar posición original
      for(let i=0;i<30;i++){if(!hits(ob))break;ob=[ob[0],ob[1]-2,ob[2],ob[3]-2];}
      if (ob[1] < -2) {  // salió del viewBox → mejor mover en X
        ob = ob0;
        for(let i=0;i<20;i++){if(!hits(ob))break;ob=[ob[0]-3,ob[1],ob[2]-3,ob[3]];}
      }
    }
    if (ob[0] < 2) ob = [2, ob[1], 2+ow, ob[3]];
    reg(ob);
    gEl.appendChild(mkt(ob[0], ob[3], ottGlyph, '#111', '14px'));
  }


  // ── 8. Glifo de cuerda (Notación) ────────────────────────────
  if (stringGlyph) {
    const syRaw = fromE4<0 ? YBASE-fromE4*SPX+28 : YBASE+26;
    let sx=nx, sy=syRaw;
    let sb;
    if (syRaw > 114) {
      // No cabe abajo → a la izquierda de la nota
      sx=nx+24; sy=y;
      sb=[sx-10, sy-14, sx+10, sy+4];
    } else {
      sb=[sx-10, sy-16, sx+10, sy+4];
    }
    const fb = resolve(sb, -3, 0, 10);
    reg(fb);
    const sg=mkt(fb[0]+10, fb[3]-4, stringGlyph, '#888', '18px');
    sg.setAttribute('text-anchor','middle'); gEl.appendChild(sg);
  }

  // ── 9. Número romano (Notación) ──────────────────────────────
  if (stringGlyph !== undefined && stringGlyph !== null && fretNum>0) {
    const ROMANS=['','I','II','III','IV','V','VI','VII','VIII','IX','X',
                  'XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX','XXI','XXII'];
    const rStr = fretNum<=20 ? ROMANS[fretNum] : null;
    if (rStr) {
      const rw = rStr.length*7;
      let rx, ry;
      if (fromE4>8) {
        rx=nx-38; ry=Math.max(10, y-8);
      } else {
        rx=nx-20; ry=YBASE-8*SPX-10;
      }
      let rb=[rx-rw/2, ry-12, rx+rw/2, ry];
      rb = resolve(rb, -3, -2, 20);
      // Clampear al viewBox
      const cy=Math.max(12, Math.min(118, rb[3]));
      const cx=Math.max(rw/2+2, Math.min(93-rw/2, rb[0]+rw/2));
      reg([cx-rw/2, cy-12, cx+rw/2, cy]);
      const rt=mkt(cx, cy, rStr, '#aaa', '12px', 'Times New Roman,serif');
      rt.setAttribute('text-anchor','middle'); gEl.appendChild(rt);
    }
  }
}

function toRoman(n){const r=['','I','II','III','IV','V','VI','VII','VIII','IX','X','XI','XII','XIII','XIV','XV','XVI','XVII','XVIII','XIX','XX','XXI','XXII'];return r[n]||n;}

function notaToMidi(n){const m=n.match(/([A-G]#?)(\d)/);if(!m)return null;const idx=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'].indexOf(m[1]);if(idx===-1)return null;return(parseInt(m[2])+1)*12+idx;}

let zoomLevel = window.innerWidth < 600 ? 0.35 : 1;
let panX=0,panY=0,isDragging=false,startX,startY;

function setupCamera(){
  const wrap = document.querySelector('.fretboard-svg-area');
  const m = document.getElementById('mastil');
  let dragMoved = false;

  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    zoomLevel=Math.min(Math.max(.4,zoomLevel-e.deltaY*.001),3);
    m.style.setProperty('--zoom',zoomLevel);
  },{passive:false});

  wrap.addEventListener('pointerdown',e=>{
    // Solo arrastrar con botón izquierdo/táctil; NO capturar el puntero
    // (setPointerCapture robaría los eventos de los nodos SVG)
    if(e.button!==0&&e.pointerType==='mouse') return;
    // Si el target es un nodo SVG, no iniciar drag
    if(e.target.classList.contains('nodo')) return;
    isDragging = true;
    dragMoved  = false;
    startX = e.clientX - panX;
    startY = e.clientY - panY;
    wrap.style.cursor = 'grabbing';
  });

  wrap.addEventListener('pointermove',e=>{
    if(!isDragging) return;
    const dx = e.clientX - startX - panX;
    const dy = e.clientY - startY - panY;
    if(Math.abs(dx)>3 || Math.abs(dy)>3) dragMoved = true;
    panX = e.clientX - startX;
    panY = e.clientY - startY;
    m.style.setProperty('--pan-x',panX+'px');
    m.style.setProperty('--pan-y',panY+'px');
  });

  wrap.addEventListener('pointerup',e=>{
    const wasDragging = isDragging && dragMoved;
    isDragging = false;
    dragMoved  = false;
    wrap.style.cursor = 'grab';
    // Si no hubo movimiento real, es un clic en el fondo → cerrar globos
    if(!wasDragging && !e.target.classList.contains('nodo')){
      cerrarGlobos();
    }
  });

  // ── Pinch-to-zoom táctil ─────────────────────────────
  let lastPinchDist = null;
  wrap.addEventListener('touchstart', e => {
    if(e.touches.length === 2) {
      lastPinchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  }, {passive: true});
  wrap.addEventListener('touchmove', e => {
    if(e.touches.length === 2 && lastPinchDist) {
      e.preventDefault();
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      zoomLevel = Math.min(Math.max(.4, zoomLevel + (dist - lastPinchDist) * 0.005), 3);
      m.style.setProperty('--zoom', zoomLevel);
      lastPinchDist = dist;
    }
  }, {passive: false});
  wrap.addEventListener('touchend', () => { lastPinchDist = null; }, {passive: true});
}

function buildPiano(){
  const piano=document.getElementById('piano');
  const nombres=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const notas=[];
  for(let o=3;o<=8;o++){for(let i=0;i<12;i++){let n=nombres[i]+o;if(o===3&&i<4)continue;if(o===8&&i>7)break;notas.push(n);}}
  const wrap=document.createElement('div');wrap.className='piano-keys';
  notas.forEach(n=>{
    const k=document.createElement('div');k.className=`key ${n.includes('#')?'black':'white'}`;k.dataset.note=n;
    if(n==='C4'){const d=document.createElement('div');d.className='middle-c-dot';k.appendChild(d);}
    k.onclick=()=>{document.getElementById('inputNota').value=n;let m=notaToMidi(n);if(m>lastMidiVisor)direccionVisor='subiendo';if(m<lastMidiVisor)direccionVisor='bajando';lastMidiVisor=m;buscarNota();highlightKey(n);};
    wrap.appendChild(k);
  });
  piano.appendChild(wrap);
}
function highlightKey(note){document.querySelectorAll('.key').forEach(k=>k.classList.toggle('active',k.dataset.note===note.toUpperCase()));}
function actualizarDesdeInput(){const val=document.getElementById('inputNota').value.trim().toUpperCase();let m=notaToMidi(val);if(m){if(m>lastMidiVisor)direccionVisor='subiendo';if(m<lastMidiVisor)direccionVisor='bajando';lastMidiVisor=m;}buscarNota();highlightKey(val);}

  CUERDAS_DATA.forEach((c,i)=>{
    let l=document.createElementNS('http://www.w3.org/2000/svg','line');
    const L_actual=window.LARGO_CUERDA_ACTUAL||LARGO_CUERDA;l.setAttribute('x1',OFFSET_X);l.setAttribute('y1',c.y_cej||c.y);l.setAttribute('x2',OFFSET_X+L_actual);l.setAttribute('y2',c.y_pue||c.y);
    l.classList.add('cuerda');l.style.strokeWidth=widths[i];cg.appendChild(l);
    let t=document.createElementNS('http://www.w3.org/2000/svg','text');
    t.setAttribute('x',OFFSET_X-8);t.setAttribute('y',(c.y_cej||c.y)+4);t.textContent=c.nota;t.classList.add('label-cuerda');
    t.onclick=()=>{if(cuerdasFijas.has(c.nota)){cuerdasFijas.delete(c.nota);t.classList.remove('cuerda-fija');}else{cuerdasFijas.add(c.nota);t.classList.add('cuerda-fija');}buscarNota();};
    t.onmouseenter=()=>{if(!cuerdasFijas.has(c.nota))mostrarSoloCuerda(c.nota);};
    t.onmouseleave=()=>buscarNota();
    cg.appendChild(t);
  });
}

// Visor miniatura
function renderVisor(midi){
  const g=document.getElementById('note-group-visor');g.innerHTML='';
  if(!midi)return;
  const d=VISOR_DATA[midi%12],oct=Math.floor(midi/12)-1,yBase=28.5;
  let ms=(oct*7+d.s)-(4*7+6),ma=d.alt,es=d.en?(oct*7+d.enS)-(4*7+6):null,ea=d.enAlt;
  if(direccionVisor==='bajando'&&d.en){[ms,es]=[es,ms];[ma,ea]=[ea,ma];}
  let msD=ms,esD=es,ottGlyph=null,ottLeft=false;
  if(ms>=25){msD=ms-14;ottGlyph='';ottLeft=true;}   // Fa8+: 15ma izquierda
  else if(ms>=18){msD=ms-14;ottGlyph='';}            // Fa7-Mi8: 15ma arriba
  else if(ms>=11){msD=ms-7; ottGlyph='';}            // Fa6-Mi7: 8va arriba
  if(esD!==null){
    if(esD>=17)esD-=14;
    else if(esD>=10)esD-=7;
  }
  dvNote(50,yBase-(msD*4),ma,false,msD,ottGlyph,ottLeft);
  if(esD!==null)dvNote(80,yBase-(esD*4),ea,true,esD,null,false);
}
function dvNote(x,y,alt,grey,step,ottGlyph,ottLeft){
  const g=document.getElementById('note-group-visor'),c=grey?'#999':'#1c1b18';
  if(alt){const a=document.createElementNS('http://www.w3.org/2000/svg','text');a.setAttribute('x',x-12);a.setAttribute('y',y);a.setAttribute('font-size','18pt');a.setAttribute('fill',c);a.textContent=alt;g.appendChild(a);}
  const n=document.createElementNS('http://www.w3.org/2000/svg','text');n.setAttribute('x',x);n.setAttribute('y',y);n.setAttribute('font-size','22pt');n.setAttribute('fill',c);n.textContent='\uE0A4';g.appendChild(n);
  if(step<=-6)for(let s=-6;s>=step;s--)if(Math.abs(s)%2===0)dvLedger(x+7,28.5-(s*4),c);
  if(step>=6)for(let s=6;s<=step;s++)if(Math.abs(s)%2===0)dvLedger(x+7,28.5-(s*4),c);
  if(ottGlyph){const ov=document.createElementNS('http://www.w3.org/2000/svg','text');ov.setAttribute('x',ottLeft?String(x-35):String(x-4));ov.setAttribute('y',ottLeft?String(y):String(y-12));ov.setAttribute('font-size','11pt');ov.setAttribute('font-family','Bravura,serif');ov.setAttribute('fill',c);ov.textContent=ottGlyph;document.getElementById('note-group-visor').appendChild(ov);}
}
function dvLedger(x,y,c){const l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',x-10);l.setAttribute('x2',x+5);l.setAttribute('y1',y);l.setAttribute('y2',y);l.setAttribute('stroke',c);l.setAttribute('stroke-width','1');document.getElementById('note-group-visor').appendChild(l);}

// GLOBOS — creación y gestión
// ══════════════════════════════════════════════════════════════
const STRING_GLYPH = {
  'E4': '', 'B3': '', 'G3': '',
  'D3': '', 'A2': '', 'E2': ''
};

function crearGlobo(cuerda, arm, n_num, n_den, focusKey) {
  const ratio       = n_num / n_den;
  const distBelowMM = ratio * getEscalaMM();
  const distAboveMM = getEscalaMM() - distBelowMM;
  const freqSounding= 440 * Math.pow(2,(cuerda.midi + arm.s - 69)/12);
  const he          = calcHE(cuerda.nota, arm.p, cuerda.midi);
  const noteName    = he ? he.name : '—';
  const cents       = arm.cents;
  const nodeKey     = `${cuerda.nota}-${arm.p}-${n_num}/${n_den}`;
  const isFocused   = nodeKey === focusKey;

  // Traste del nodo
  const _fretExact = 12 * Math.log2(1 / (1 - n_num / n_den));
  const _fretRound = Math.round(_fretExact);
  const fretNum    = (Math.abs(_fretExact - _fretRound) < 0.02) ? _fretRound : Math.ceil(_fretExact);

  // Nota pisada transpositora: cuerda.midi + fretNum + 12
  const midiPisado  = cuerda.midi + fretNum + 12;  // +12 porque la clave  es transpositora: escribimos una 8ª arriba
  const pcPisado    = ((midiPisado % 12) + 12) % 12;
  const prefPisado  = /[A-Z]B$/.test(normNote(cuerda.nota)) && !cuerda.nota.includes('#');
  const specPisado  = getHESpec(pcPisado, 0, 1, prefPisado);

  const card = document.createElement('div');
  card.className = 'globo-card' + (isFocused ? ' focused' : '');
  card.dataset.nodeKey = nodeKey;

  // Cabecera
  const head = document.createElement('div');
  head.className = 'globo-head';
  head.innerHTML = `<div class="globo-head-frac">${n_num}/${n_den}</div>
    <div class="globo-head-dist"><b>${distBelowMM.toFixed(0)}</b><span>mm</span></div>`;
  card.appendChild(head);

  // Botones
  const acts = document.createElement('div');
  acts.className = 'globo-actions';
  const btnN = document.createElement('button');
  btnN.className = 'globo-btn active'; btnN.textContent = 'Notación';
  const btnA = document.createElement('button');
  btnA.className = 'globo-btn'; btnA.textContent = 'Altura';
  const btnD = document.createElement('button');
  btnD.className = 'globo-btn'; btnD.textContent = 'Detalles';
  acts.appendChild(btnN); acts.appendChild(btnA); acts.appendChild(btnD);
  card.appendChild(acts);

  // Cuerpo
  const body = document.createElement('div');
  body.className = 'globo-body';

  const svgNS = 'http://www.w3.org/2000/svg';

  function makeSVG(clefGlyph) {
    const s = document.createElementNS(svgNS,'svg');
    s.setAttribute('viewBox','0 0 95 120');
    s.setAttribute('preserveAspectRatio','xMidYMid meet');
    s.style.overflow = 'visible';
    const sg = document.createElementNS(svgNS,'g');
    sg.setAttribute('stroke','#c5c5c5'); sg.setAttribute('stroke-width','0.5');
    [40,50,60,70,80].forEach(yy => {
      const l = document.createElementNS(svgNS,'line');
      l.setAttribute('x1','5'); l.setAttribute('x2','90');
      l.setAttribute('y1',yy); l.setAttribute('y2',yy);
      sg.appendChild(l);
    });
    s.appendChild(sg);
    const cl = document.createElementNS(svgNS,'text');
    cl.setAttribute('x','5'); cl.setAttribute('y','70.1');
    cl.setAttribute('font-size','38.4px'); cl.setAttribute('font-family','Bravura,serif');
    cl.setAttribute('fill','#222'); cl.textContent = clefGlyph;
    s.appendChild(cl);
    return s;
  }

  // Face NOTACIÓN
  const faceN = document.createElement('div');
  faceN.className = 'globo-notation';
  const svgN = makeSVG('');
  const heGN = document.createElementNS(svgNS,'g');
  heGN.setAttribute('class','he-note-group');
  svgN.appendChild(heGN);
  faceN.appendChild(svgN);
  body.appendChild(faceN);

  // Face ALTURA
  const faceA = document.createElement('div');
  faceA.className = 'globo-notation hidden';
  const svgA = makeSVG('');
  const heGA = document.createElementNS(svgNS,'g');
  heGA.setAttribute('class','he-note-group');
  svgA.appendChild(heGA);
  faceA.appendChild(svgA);
  body.appendChild(faceA);

  // Face DETALLES
  const centsAbs   = Math.abs(cents);
  const centsClass = cents < -5 ? 'neg' : cents > 5 ? 'pos' : 'zero';
  const centsLabel = (cents > 0 ? '+' : '') + cents + '¢';
  const barPct     = Math.min(100, centsAbs / 55 * 100);
  const faceD = document.createElement('div');
  faceD.className = 'globo-details';
  faceD.innerHTML = `
    <div class="cents-bar-wrap">
      <div class="cents-label"><span>DESVIAC.</span><span class="cents-val ${centsClass}">${centsLabel}</span></div>
      <div class="cents-track">
        <div class="cents-center-mark"></div>
        <div class="cents-fill ${centsClass}" style="width:${barPct/2}%"></div>
      </div>
    </div>
    <div class="dist-rows">
      <div class="dist-row"><span class="dist-row-label">Nut →</span>
        <span class="dist-row-val">${distBelowMM.toFixed(1)} <span class="dist-row-unit">mm</span></span></div>
      <div class="dist-row"><span class="dist-row-label">Bridge →</span>
        <span class="dist-row-val">${distAboveMM.toFixed(1)} <span class="dist-row-unit">mm</span></span></div>
    </div>
    <div class="globo-sounding">${noteName} · ${freqSounding.toFixed(1)} Hz</div>`;
  body.appendChild(faceD);
  card.appendChild(body);

  // Toggle pestañas
  function activarFace(cual) {
    faceN.classList.add('hidden');    faceA.classList.add('hidden');
    faceD.classList.remove('visible');
    btnN.classList.remove('active');  btnA.classList.remove('active'); btnD.classList.remove('active');
    if (cual === 'N') { faceN.classList.remove('hidden'); btnN.classList.add('active'); }
    else if (cual === 'A') { faceA.classList.remove('hidden'); btnA.classList.add('active'); }
    else { faceD.classList.add('visible'); btnD.classList.add('active'); }
  }
  btnN.addEventListener('click', () => activarFace('N'));
  btnA.addEventListener('click', () => activarFace('A'));
  btnD.addEventListener('click', () => activarFace('D'));

  // Guardar para render posterior
  const strGlyph = STRING_GLYPH[cuerda.nota] || null;
  card._heData = he ? {
    gN: heGN, midiN: midiPisado, specN: specPisado, prefN: prefPisado,
    strGlyph, fretNum,
    gA: heGA, midi: he.midi, spec: he.spec, pref: he.pref,
    cents
  } : null;

  return card;
}

// Mostrar todos los globos de una fila
function mostrarGlobos(cuerda, arm, focusKey) {
  const footer = document.getElementById('globos-footer');
  const scroll = document.getElementById('globos-scroll');
  scroll.innerHTML = '';

  // Solo nodos coprimos
  const nodos = [];
  for (let n=1; n<arm.p; n++) {
    if (gcd(n, arm.p) === 1) nodos.push(n);
  }

  if (nodos.length === 0) { footer.classList.remove('active'); return; }

  const cards = [];
  nodos.forEach(n => {
    const card = crearGlobo(cuerda, arm, n, arm.p, focusKey);
    scroll.appendChild(card);
    cards.push(card);
  });

  footer.classList.add('active');
  // Ajustar right del scroll al ancho real del sidebar (solo en desktop)
  const sidePanel = document.querySelector('.side-panel');
  const isMobile = window.innerWidth <= 600;
  const sideW = (!isMobile && sidePanel) ? sidePanel.offsetWidth : 0;
  document.getElementById('globos-scroll').style.right = sideW + 'px';

  // Inicializar flechas de scroll
  requestAnimationFrame(() => {
    const sc = document.getElementById('globos-scroll');
    sc.removeEventListener('scroll', updateScrollArrows);
    sc.addEventListener('scroll', updateScrollArrows);
    updateScrollArrows();
  });

  // Render HE tras DOM
  setTimeout(() => {
    cards.forEach(card => {
      const d = card._heData;
      if (!d) return;
      // Face Notación: nota pisada transpuesta, con cuerda+romano, normalizada
      renderHESVG(d.gN, d.midiN, d.specN, d.prefN, d.strGlyph, d.fretNum, false, 0,       false);
      // Face Altura: MIDI real sin normalizar, con cents, sin cuerda ni romano
      renderHESVG(d.gA, d.midi,  d.spec,  d.pref,  null,       null,      true,  d.cents, true);
    });
  }, 0);

  // Scroll al globo enfocado — tras el render
  if (focusKey) {
    setTimeout(() => {
      const focused = scroll.querySelector('.globo-card.focused');
      if (focused) {
        focused.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
        // Quitar el borde enfocado tras 2s
        setTimeout(() => focused.classList.remove('focused'), 2000);
      }
    }, 50);
  }
}

function scrollGlobos(dir) {
  const sc = document.getElementById('globos-scroll');
  sc.scrollBy({left: dir * 200, behavior: 'smooth'});
}

function updateScrollArrows() {
  const sc = document.getElementById('globos-scroll');
  const al = document.getElementById('arrow-left');
  const ar = document.getElementById('arrow-right');
  if (!al || !ar) return;
  al.classList.toggle('visible', sc.scrollLeft > 10);
  ar.classList.toggle('visible', sc.scrollLeft < sc.scrollWidth - sc.clientWidth - 10);
}

function cerrarGlobos() {
  document.getElementById('globos-footer').classList.remove('active');
  document.getElementById('globos-scroll').innerHTML = '';
  selectedRowId = null;
  activeNodeKey = null;
  document.querySelectorAll('.result-row').forEach(r=>r.classList.remove('selected'));
  resetNodeColors();
}

// ── Colores de nodos ──────────────────────────────────────
// selectedArm: {cuerda, arm} o null
let activeSelection = null; // {cuerda, arm}

function applyNodeGreying(selCuerda, selArm) {
  // Poner todos los nodos en gris excepto los de la cuerda+parcial activos
  document.querySelectorAll('#capa-nodos .nodo').forEach(el => {
    const key = el.dataset.nodeKey || '';
    const belongsToSel = selCuerda && selArm
      ? key.startsWith(`${selCuerda.nota}-${selArm.p}`)
      : false;
    el.classList.toggle('greyed', !belongsToSel);
  });
}

function resetNodeColors() {
  document.querySelectorAll('#capa-nodos .nodo').forEach(el => {
    el.classList.remove('greyed','pulsing');
  });
  activeSelection = null;
}

// ── Selección desde sidebar ───────────────────────────────
function selectRow(id, rowData, e) {
  if (e) e.stopPropagation();

  if (selectedRowId === id) {
    cerrarGlobos();
    return;
  }
  selectedRowId = id;
  activeNodeKey = null;

  document.querySelectorAll('.result-row').forEach(r=>r.classList.remove('selected'));
  const el = document.querySelector(`.result-row[data-id="${id}"]`);
  if (el) el.classList.add('selected');

  if (rowData && rowData.type === 'nat') {
    activeSelection = {cuerda: rowData.cuerda, arm: rowData.arm};
    applyNodeGreying(rowData.cuerda, rowData.arm);
    mostrarGlobos(rowData.cuerda, rowData.arm, null);
  }
}

// ── Selección desde nodo del diapasón ────────────────────
function selectNode(cuerda, arm, n_num, n_den, nodeEl) {
  // Pulso visual
  nodeEl.classList.remove('pulsing');
  void nodeEl.offsetWidth; // reflow para reiniciar animación
  nodeEl.classList.add('pulsing');

  const nodeKey = `${cuerda.nota}-${arm.p}-${n_num}/${n_den}`;
  activeNodeKey = nodeKey;
  activeSelection = {cuerda, arm};
  applyNodeGreying(cuerda, arm);

  // Highlight fila del sidebar
  const rowId = `nat-${cuerda.nota}-${arm.p}`;
  document.querySelectorAll('.result-row').forEach(r=>r.classList.remove('selected'));
  const sideRow = document.querySelector(`.result-row[data-id="${rowId}"]`);
  if (sideRow) sideRow.classList.add('selected');
  selectedRowId = rowId;

  mostrarGlobos(cuerda, arm, nodeKey);
}

// DIBUJO EN EL DIAPASÓN
// ══════════════════════════════════════════════════════════════
function mostrarSoloCuerda(nombreCuerda){
  const capa=document.getElementById('capa-nodos');
  const showHigh=document.getElementById('checkSuperiores').checked;
  capa.innerHTML='';
  const cuerda=CUERDAS_DATA.find(c=>c.nota===nombreCuerda);
  if(!cuerda)return;
  SERIE.forEach(arm=>{if(arm.p>7&&!showHigh)return;dibujarArmonico({type:'nat',cuerda,arm},false);});
}

function buscarNota(){
  const capa=document.getElementById('capa-nodos');if(!capa)return;capa.innerHTML='';
  const input=document.getElementById('inputNota').value.trim().toUpperCase();
  const targetMidi=notaToMidi(input);
  const showHigh=document.getElementById('checkSuperiores').checked;
  const useTol=document.getElementById('checkCercanos').checked;
  const checkArt=document.getElementById('checkArtificial').checked;

  cuerdasFijas.forEach(nc=>{
    const co=CUERDAS_DATA.find(cd=>cd.nota===nc);
    if(co)SERIE.forEach(arm=>{if(arm.p>7&&!showHigh)return;dibujarArmonico({type:'nat',cuerda:co,arm},true);});
  });

  resultadosActuales=[];
  const idsC=new Set(congelados.map(c=>c.id));

  if(targetMidi){
    renderVisor(targetMidi);
    const TOL=useTol?0.5:0.05;
    CUERDAS_DATA.forEach(cuerda=>{
      SERIE.forEach(arm=>{
        if(arm.p>7&&!showHigh)return;
        const diff=(cuerda.midi+arm.s)-targetMidi;
        if(Math.abs(diff)<=TOL){
          const px=Math.round(getXRatio(1/arm.p));
          resultadosActuales.push({cuerda,arm,desv:Math.round(diff*100),type:'nat',id:generarID({type:'nat',cuerda,arm}),dificultad:calcDif(arm.p,px)});
        }
      });
      if(checkArt){
        // Tipos según config — octava siempre activa por defecto
        const doOct  = document.getElementById('artOctava')  ? document.getElementById('artOctava').checked  : true;
        const do5th  = document.getElementById('artQuinta')  ? document.getElementById('artQuinta').checked  : false;
        const do2oct = document.getElementById('artDblOct')  ? document.getElementById('artDblOct').checked  : false;
        const do3M   = document.getElementById('artTercera') ? document.getElementById('artTercera').checked : false;
        // {semis: semitones sobre la nota pisada, frac: posición del nodo, label}
        const artModes = [];
        if(doOct)  artModes.push({semis:12,   label:'oct'});
        if(do5th)  artModes.push({semis:19,   label:'5th'});  // redondeo a 19st
        if(do2oct) artModes.push({semis:24,   label:'2oct'});
        if(do3M)   artModes.push({semis:28,   label:'3M'});   // 27.86 redondeado
        for(let tP=1;tP<=17;tP++){
          artModes.forEach(am=>{
            const notaResult = cuerda.midi + tP + am.semis;
            if(Math.abs(notaResult - targetMidi) <= 0.5){
              const id = `art-${cuerda.nota}-${tP}-${am.label}`;
              if(!resultadosActuales.find(r=>r.id===id))
                resultadosActuales.push({cuerda,traste:tP,type:'art',artType:am.label,
                  id,dificultad:0,desv:notaResult-targetMidi});
            }
          });
        }
      }
    });
  }

  congelados.forEach(c=>dibujarArmonico(c,true));
  resultadosActuales.forEach(r=>{if(!idsC.has(r.id))dibujarArmonico(r,false);});
  resultadosActuales.sort((a,b)=>Math.abs(a.desv||0)-Math.abs(b.desv||0));

  // Mantener greying si hay selección activa
  if (activeSelection) applyNodeGreying(activeSelection.cuerda, activeSelection.arm);

  renderTabla();
}

function dibujarArmonico(r,isFrozen){
  const color=isFrozen?'var(--freeze)':(r.type==='nat'?r.arm.c:'var(--purple-art)');
  if(r.type==='nat'){
    const drawn=new Set();
    for(let n=1;n<r.arm.p;n++){
      if(gcd(n,r.arm.p)===1){
        const xPos=Math.round(getXRatio(n/r.arm.p));
        if(!drawn.has(xPos)){
          drawNode(xPos,getStringY(r.cuerda,xPos),color,r.cuerda,r.arm,n,r.arm.p);
          drawn.add(xPos);
        }
      }
    }
  } else {
    drawArt(getX(r.traste),getX(r.traste+12),getStringY(r.cuerda,getX(r.traste)),color);
  }
}

function drawNode(x,y,c,cuerda,arm,n_num,n_den){
  const capa=document.getElementById('capa-nodos');
  const tt=12*Math.log2(LARGO_CUERDA/(LARGO_CUERDA-(x-OFFSET_X)));
  const esExacto=Math.abs(tt-Math.round(tt))<0.1;
  if(!esExacto){
    const barT=document.createElementNS('http://www.w3.org/2000/svg','line');
    barT.setAttribute('x1',x);barT.setAttribute('y1',y-8);barT.setAttribute('x2',x);barT.setAttribute('y2',y-5);
    barT.setAttribute('stroke',c);barT.classList.add('guia-vertical');capa.appendChild(barT);
    const barB=document.createElementNS('http://www.w3.org/2000/svg','line');
    barB.setAttribute('x1',x);barB.setAttribute('y1',y+5);barB.setAttribute('x2',x);barB.setAttribute('y2',y+8);
    barB.setAttribute('stroke',c);barB.classList.add('guia-vertical');capa.appendChild(barB);
  }
  const el=document.createElementNS('http://www.w3.org/2000/svg','circle');
  el.setAttribute('cx',x);el.setAttribute('cy',y);el.setAttribute('r',4);
  el.setAttribute('fill',c);el.classList.add('nodo');

  if (cuerda && arm) {
    const nodeKey = `${cuerda.nota}-${arm.p}-${n_num}/${n_den}`;
    el.dataset.nodeKey = nodeKey;

    // Clic en nodo: seleccionar y mostrar globos
    el.addEventListener('click', e => {
      e.stopPropagation();
      selectNode(cuerda, arm, n_num, n_den, el);
    });
  }

  capa.appendChild(el);
}

function drawArt(xI,xD,y,color){
  const capa=document.getElementById('capa-nodos');
  capa.appendChild(drawHand(xI,y+22,'L',color));
  const p=document.createElementNS('http://www.w3.org/2000/svg','circle');p.setAttribute('cx',xI);p.setAttribute('cy',y);p.setAttribute('r',4);p.setAttribute('fill','none');p.setAttribute('stroke',color);p.setAttribute('stroke-width','2');capa.appendChild(p);
  capa.appendChild(drawHand(xD,y+22,'R',color));
  const l=document.createElementNS('http://www.w3.org/2000/svg','line');l.setAttribute('x1',xD);l.setAttribute('y1',y-12);l.setAttribute('x2',xD);l.setAttribute('y2',y+12);l.classList.add('guia-90');l.style.stroke=color;capa.appendChild(l);
  const ci=document.createElementNS('http://www.w3.org/2000/svg','circle');ci.setAttribute('cx',xD);ci.setAttribute('cy',y);ci.setAttribute('r',7);ci.setAttribute('fill',color);ci.classList.add('nodo');capa.appendChild(ci);
}

function drawHand(x,y,t,color){
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');p.classList.add('icono-mano');p.setAttribute('stroke',color);
  p.setAttribute('d',t==='L'?`M${x-4},${y} a4,4 0 0,1 8,0`:`M${x-4},${y} l8,0 M${x},${y} l0,-5`);
  g.appendChild(p);return g;
}

function calcDif(parcial,x){
  const tt=12*Math.log2(LARGO_CUERDA/(LARGO_CUERDA-(x-OFFSET_X)));
  const esExacto=Math.abs(tt-Math.round(tt))<0.1;
  if(esExacto&&parcial<=4)return 0;
  if(parcial>9||tt>15)return 3;
  if(parcial>4||tt>12)return 2;
  return 1;
}

function toggleFreeze(id,e){
  e.stopPropagation();
  const idx=congelados.findIndex(c=>c.id===id);
  if(idx>-1)congelados.splice(idx,1);
  else{const item=resultadosActuales.find(r=>generarID(r)===id);if(item){const nota=document.getElementById('inputNota').value.trim().toUpperCase();congelados.push({...item,id,notaObjetivo:nota});}}
  buscarNota();
}
function borrarCongelados(){congelados=[];cerrarGlobos();buscarNota();}

function renderTabla(){
  const box=document.getElementById('infoBox');
  const idsC=new Set(congelados.map(c=>c.id));
  const rows=[
    ...congelados.map(r=>buildRow(r,true)),
    ...resultadosActuales.filter(r=>!idsC.has(generarID(r))).map(r=>buildRow(r,false))
  ];
  if(!rows.length){box.innerHTML=`<div class="empty-state"><span style="font-size:22px;opacity:.3">♩</span><span>Sin armónicos para esta nota</span></div>`;return;}
  box.innerHTML=rows.join('');
}

function buildRow(r,frozen){
  const id=frozen?r.id:generarID(r);
  const fc=frozen?' frozen':'';
  const sel=selectedRowId===id?' selected':'';
  const ba=frozen?' on':'';
  const tag=frozen?`<span class="frozen-tag">${r.notaObjetivo}</span> `:'';
  const diffHTML=r.dificultad>0?`<div class="diff-dots">${'<div class="diff-dot"></div>'.repeat(Math.min(r.dificultad,3))}</div>`:'';

  if(r.type==='nat'){
    const cc=frozen?'var(--freeze)':getCentsColor(r.desv);
    const cbg=frozen?'#cffafe':'var(--surface-2)';
    const cs=(r.desv>0?'+':'')+r.desv+'¢';
    return `<div class="result-row${fc}${sel}" data-id="${id}" onclick="selectRow('${id}', resultadosActuales.find(x=>x.id==='${id}')||congelados.find(x=>x.id==='${id}'), event)">
      <button class="freeze-btn${ba}" onclick="toggleFreeze('${id}',event)">${snowSVG}</button>
      <div class="row-body">
        <div class="row-main">${tag}Cuerda <b>${r.cuerda.nota}</b> · P${r.arm.p} <span style="opacity:.6;font-size:11px">(${r.arm.frac})</span></div>
        <div class="row-sub">${r.arm.n}</div>
      </div>
      <div class="row-right">${diffHTML}<span class="sym" style="color:${frozen?'var(--freeze)':r.arm.c}">${r.arm.sym}</span><span class="cents-badge" style="color:${cc};background:${cbg}">${cs}</span></div>
    </div>`;
  } else {
    const ac=frozen?'var(--freeze)':'var(--purple-art)';
    return `<div class="result-row${fc}${sel}" data-id="${id}">
      <button class="freeze-btn${ba}" onclick="toggleFreeze('${id}',event)">${snowSVG}</button>
      <div class="row-body">
        <div class="row-main">${tag}Art. 8.ª en <b>${r.cuerda.nota}</b> · Tr. ${r.traste}</div>
        <div class="row-sub">Armónico artificial</div>
      </div>
      <div class="row-right"><span class="sym" style="color:${ac}">\uE261</span><span class="cents-badge">0¢</span></div>
    </div>`;
  }
}

// Cierre de globos manejado en pointerup de setupCamera


// Teclado
window.addEventListener('keydown',e=>{
  if(e.key==='Escape'){cerrarGlobos();return;}
  if(e.key==='ArrowUp'||e.key==='ArrowDown'){
    e.preventDefault();
    let input=document.getElementById('inputNota');let m=notaToMidi(input.value.trim());if(!m)return;
    if(e.key==='ArrowUp'){m++;direccionVisor='subiendo';}else{m--;direccionVisor='bajando';}
    m=Math.max(52,Math.min(115,m)); // limitar E3..G8
    const nn=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
    let nueva=nn[m%12]+(Math.floor(m/12)-1);
    input.value=nueva;lastMidiVisor=m;buscarNota();highlightKey(nueva);
  }
});

// getX y getXRatio usan LARGO_CUERDA_ACTUAL cuando hay instrumento activo
function getStringY(cuerda, x) {
  const L = window.LARGO_CUERDA_ACTUAL || LARGO_CUERDA;
  const yc = cuerda.y_cej !== undefined ? cuerda.y_cej : cuerda.y;
  const yp = cuerda.y_pue !== undefined ? cuerda.y_pue : cuerda.y;
  return yc + (x - OFFSET_X) / L * (yp - yc);
}
function getX(t) {
  const L = window.LARGO_CUERDA_ACTUAL || LARGO_CUERDA;
  return OFFSET_X + (L - (L / Math.pow(2, t/12)));
}
function getXRatio(r) {
  const L = window.LARGO_CUERDA_ACTUAL || LARGO_CUERDA;
  return OFFSET_X + (L * r);
}

function resetTodo() {
  // 1. Estado de selección

  selectedRowId  = null;

  panX = 0;
  panY = 0;
  const mastil = document.getElementById('mastil');

  mastil.style.setProperty('--pan-x', '0px');
  mastil.style.setProperty('--pan-y', '0px');
  // 4. Redibujar
  buscarNota();
}
